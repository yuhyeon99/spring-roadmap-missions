<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission04 Task03 - Validation Success</title>
    <style>
        :root {
            --ink: #12263a;
            --muted: #5d7280;
            --accent: #2f855a;
            --accent-soft: rgba(47, 133, 90, 0.12);
            --paper: rgba(255, 255, 255, 0.94);
            --line: rgba(18, 38, 58, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: "Pretendard", "SUIT", "Noto Sans KR", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top right, rgba(47, 133, 90, 0.18), transparent 28%),
                linear-gradient(145deg, #eef6ed, #d7e9ea);
        }

        .card {
            width: min(760px, 100%);
            padding: 34px;
            border-radius: 30px;
            border: 1px solid var(--line);
            background: var(--paper);
            box-shadow: 0 24px 60px rgba(18, 38, 58, 0.12);
        }

        .badge {
            display: inline-flex;
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 800;
        }

        h1,
        h2,
        p,
        dl {
            margin: 0;
        }

        h1 {
            margin-top: 16px;
            font-size: clamp(2rem, 5vw, 3.4rem);
            line-height: 1.1;
        }

        p {
            margin-top: 14px;
            color: var(--muted);
            line-height: 1.75;
        }

        dl {
            margin-top: 26px;
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 14px 18px;
            padding: 22px;
            border-radius: 22px;
            background: #fff;
            border: 1px solid var(--line);
        }

        dt {
            font-weight: 800;
            color: var(--ink);
        }

        dd {
            color: var(--muted);
        }

        .next-step {
            margin-top: 24px;
            padding: 18px 20px;
            border-radius: 20px;
            background: #f7fbf8;
            border: 1px solid var(--line);
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 24px;
            padding: 12px 18px;
            border-radius: 999px;
            background: var(--ink);
            color: #fff;
            text-decoration: none;
            font-weight: 800;
        }
    </style>
</head>
<body>
<section class="card">
    <span class="badge">Mission04 Task03</span>
    <h1 th:text="${pageTitle}">회원 가입 검증 통과 결과</h1>
    <p th:text="${registeredMember.welcomeMessage}">
        김스프링님, 회원 가입 폼 검증을 모두 통과했습니다.
    </p>

    <dl>
        <dt>이름</dt>
        <dd th:text="${registeredMember.name}">김스프링</dd>

        <dt>이메일</dt>
        <dd th:text="${registeredMember.email}">spring@example.com</dd>

        <dt>나이</dt>
        <dd th:text="${registeredMember.age}">23</dd>

        <dt>학습 트랙</dt>
        <dd th:text="${registeredMember.studyTrackLabel}">입력값 검증</dd>

        <dt>자기소개</dt>
        <dd th:text="${registeredMember.introduction}">자기소개를 아직 작성하지 않았습니다.</dd>
    </dl>

    <div class="next-step">
        <h2>다음 단계</h2>
        <p th:text="${registeredMember.nextStep}">
            입력값 검증 학습 트랙으로 다음 화면 구현 실습을 이어갈 수 있습니다.
        </p>
    </div>

    <a th:href="@{/mission04/task03/members/new}">다시 입력해 보기</a>
</section>
</body>
</html>
