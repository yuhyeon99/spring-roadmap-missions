<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission04 Task10 - 404 Alert</title>
    <style>
        :root {
            --night: #1a1f36;
            --night-soft: #2b3255;
            --signal: #ff8f5a;
            --signal-soft: rgba(255, 143, 90, 0.14);
            --paper: rgba(255, 255, 255, 0.92);
            --muted: #5b6479;
            --line: rgba(26, 31, 54, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: "Pretendard", "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 143, 90, 0.26), transparent 32%),
                linear-gradient(135deg, #eef2f7 0%, #d8e2f0 100%);
            color: var(--night);
        }

        .panel {
            width: min(720px, 100%);
            padding: 34px;
            border-radius: 30px;
            border: 1px solid var(--line);
            background: var(--paper);
            box-shadow: 0 24px 64px rgba(26, 31, 54, 0.14);
        }

        .badge {
            display: inline-flex;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--signal-soft);
            color: var(--signal);
            font-weight: 800;
        }

        h1 {
            margin: 16px 0 12px;
            font-size: clamp(2.2rem, 6vw, 4.4rem);
            line-height: 1;
        }

        h2 {
            margin: 0 0 16px;
            font-size: clamp(1.3rem, 3vw, 2rem);
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.8;
        }

        dl {
            margin: 24px 0 0;
            padding: 18px 20px;
            border-radius: 20px;
            background: #f8fafc;
        }

        dt {
            color: var(--night-soft);
            font-weight: 700;
            margin-top: 14px;
        }

        dt:first-child {
            margin-top: 0;
        }

        dd {
            margin: 6px 0 0;
            color: var(--night);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }

        .actions a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 800;
        }

        .primary {
            background: var(--night);
            color: #fff;
        }

        .secondary {
            background: #fff;
            color: var(--night);
            border: 1px solid var(--line);
        }
    </style>
</head>
<body>
<section class="panel">
    <span class="badge" th:text="|${errorCode} ${errorName}|">404 NOT_FOUND</span>
    <h1 th:text="${errorCode}">404</h1>
    <h2 th:text="${alertTitle}">요청한 자원을 찾을 수 없습니다.</h2>
    <p th:text="${alertMessage}">에러 안내 메시지</p>

    <dl>
        <dt>요청 경로</dt>
        <dd th:text="${requestUri}">/mission04/task10/error-guides/999</dd>

        <dt>요청한 ID</dt>
        <dd th:text="${requestedId}">999</dd>

        <dt>다음 행동</dt>
        <dd>목록 화면으로 돌아가 유효한 자원을 다시 선택합니다.</dd>
    </dl>

    <div class="actions">
        <a class="primary" th:href="@{/mission04/task10/error-guides}">안내 목록으로 이동</a>
        <a class="secondary" th:href="@{/mission04/task10/error-guides/1}">정상 페이지 예시 보기</a>
    </div>
</section>
</body>
</html>
